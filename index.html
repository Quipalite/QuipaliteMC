<!DOCTYPE html>
<html>
<head>
  <title>Quipalite MC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:Segoe UI, Arial, sans-serif;
      background:#000;
      color:white;
      overflow-x:hidden;
    }

    header{
      text-align:center;
      padding:45px 20px;
      font-size:44px;
      font-weight:900;
      letter-spacing:3px;
      background:linear-gradient(90deg,#ff2db2,#ff66cc,#ff1493,#ff2db2);
      background-size:300% 300%;
      animation:bannerMove 5s ease infinite;
      border-bottom:3px solid #ff66cc;
    }

    @keyframes bannerMove{
      0%{background-position:0% 50%;}
      50%{background-position:100% 50%;}
      100%{background-position:0% 50%;}
    }

    .arrow-btn{
      position:fixed;
      top:20px;
      right:20px;
      z-index:9999;
      background:#ff1493;
      border:none;
      color:white;
      padding:12px 16px;
      border-radius:10px;
      font-size:18px;
      font-weight:bold;
      cursor:pointer;
      box-shadow:0 0 12px #ff1493;
    }

    .tabs{
      text-align:center;
      margin:20px 0;
    }

    .tab{
      background:#111;
      border:1px solid #ff1493;
      color:white;
      padding:8px 14px;
      margin:5px;
      border-radius:6px;
      cursor:pointer;
      font-weight:bold;
    }

    .tab.active{background:#ff1493;}

    #searchInput{
      width:250px;
      padding:10px;
      border-radius:8px;
      border:1px solid #ff1493;
      background:#111;
      color:white;
      font-weight:bold;
      outline:none;
    }

    .container{
      max-width:900px;
      margin:auto;
      padding:20px;
    }

    .mode{display:none;}
    .mode.active{display:block;}

    .player{
      background:#111;
      margin:12px 0;
      padding:18px;
      border-radius:12px;
      border:1px solid #ff1493;
      cursor:pointer;
    }

    .gold-glow{border:2px solid gold;box-shadow:0 0 16px gold;}
    .silver-glow{border:2px solid silver;box-shadow:0 0 14px silver;}
    .bronze-glow{border:2px solid #cd7f32;box-shadow:0 0 12px #cd7f32;}

    .number{
      display:inline-block;
      padding:5px 11px;
      border-radius:20px;
      font-weight:bold;
      margin-right:8px;
    }

    .gold{background:gold;color:black;}
    .silver{background:silver;color:black;}
    .bronze{background:#cd7f32;color:white;}

    .crown{
      margin-left:6px;
      text-shadow:0 0 10px gold;
    }

    .details{
      max-height:0;
      overflow:hidden;
      margin-top:0;
      padding:0 14px;
      background:#0a0a0a;
      border-left:3px solid #ff69b4;
      border-radius:8px;
      transition:0.3s ease;
    }

    .details.open{
      max-height:250px;
      margin-top:12px;
      padding:14px;
    }

    .stat{margin:6px 0;font-weight:700;}

    .no-results{
      text-align:center;
      margin:15px;
      font-weight:bold;
      color:#ff69b4;
      opacity:0;
      transform:scale(0.9);
      transition:0.25s ease;
    }

    .no-results.show{
      opacity:1;
      transform:scale(1);
    }
  </style>
</head>

<body>

<header>QUIPALITE MC</header>

<button class="arrow-btn" onclick="toggleSort()" id="sortBtn">⬆</button>

<div class="tabs">
  <button class="tab active" onclick="showMode('overall', this)">Overall</button>
  <button class="tab" onclick="showMode('sword', this)">Sword</button>
  <button class="tab" onclick="showMode('axe', this)">Axe</button>
  <button class="tab" onclick="showMode('uhc', this)">UHC</button>
  <button class="tab" onclick="showMode('mace', this)">Mace</button>
  <button class="tab" onclick="showMode('spear', this)">Spear</button>
</div>

<div style="text-align:center;margin-bottom:15px;">
  <input type="text" id="searchInput" placeholder="Search player..." onkeyup="searchPlayers()">
</div>

<div class="container">
  <div id="overall" class="mode active"><div class="no-results">No results found</div></div>
  <div id="sword" class="mode"><div class="no-results">No results found</div></div>
  <div id="axe" class="mode"><div class="no-results">No results found</div></div>
  <div id="uhc" class="mode"><div class="no-results">No results found</div></div>
  <div id="mace" class="mode"><div class="no-results">No results found</div></div>
  <div id="spear" class="mode"><div class="no-results">No results found</div></div>
</div>

<script>

let sortLowToHigh = true;

function createPlayers(prefix, containerId){
  const container = document.getElementById(containerId);

  for(let i=1;i<=15;i++){

    let glow="";
    let numberClass="";

    if(i===1){glow="gold-glow";numberClass="gold";}
    if(i===2){glow="silver-glow";numberClass="silver";}
    if(i===3){glow="bronze-glow";numberClass="bronze";}

    let playerName = "Player " + i;

    if(containerId === "overall"){
      if(i===1) playerName="Killedbycrab";
      if(i===2) playerName="Aftlow";
      if(i===3) playerName="RealO75";
      if(i===4) playerName="Yearly-scuff81";
    }

    if(containerId === "mace"){
      if(i===1) playerName="Killedbycrab";
      if(i===2) playerName="Aftlow";
      if(i===3) playerName="Yearly-scuff81";
    }

    if(containerId === "sword"){
      if(i===1) playerName="RealO75";
      if(i===2) playerName="Killedbycrab";
    }

    if(containerId === "uhc"){
      if(i===1) playerName="Killedbycrab";
      if(i===2) playerName="Yearly-scuff81";
    }

    if(containerId === "spear"){
      if(i===1) playerName="Aftlow";
      if(i===2) playerName="Yearly-scuff81";
    }

    container.innerHTML += `
      <div class="player ${glow}" data-number="${i}" onclick="handleClick('${prefix}${i}')">
        <span class="number ${numberClass}">#${i}</span>
        ${i===1?'<span class="crown">👑</span>':''}
        <b>${playerName}</b>

        <div class="details" id="${prefix}${i}">
          <div class="stat">Rank:</div>
          <div class="stat">Wins: N/A</div>
          <div class="stat">Kills: N/A</div>
          <div class="stat">Deaths: N/A</div>
        </div>
      </div>
    `;
  }
}

function handleClick(id){
  document.getElementById(id).classList.toggle("open");
}

function searchPlayers(){
  const value=document.getElementById("searchInput").value.toLowerCase();
  const active=document.querySelector(".mode.active");
  const players=active.querySelectorAll(".player");
  const noResults=active.querySelector(".no-results");

  let found=false;

  players.forEach(p=>{
    const name=p.querySelector("b").textContent.toLowerCase();
    if(name.includes(value)){
      p.style.display="block";
      found=true;
    }else{
      p.style.display="none";
    }
  });

  if(value!=="" && !found){
    noResults.classList.add("show");
  }else{
    noResults.classList.remove("show");
  }
}

function toggleSort(){
  sortLowToHigh=!sortLowToHigh;
  document.getElementById("sortBtn").textContent=sortLowToHigh?"⬆":"⬇";
}

function showMode(mode,btn){
  document.querySelectorAll(".mode").forEach(m=>m.classList.remove("active"));
  document.getElementById(mode).classList.add("active");

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  btn.classList.add("active");

  searchPlayers();
}

createPlayers("o","overall");
createPlayers("s","sword");
createPlayers("a","axe");
createPlayers("u","uhc");
createPlayers("m","mace");
createPlayers("sp","spear");

</script>

</body>
</html>
