<!DOCTYPE html>
<html>
<head>
  <title>Pink Tier Platform</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
    }

    header {
      background: pink;
      padding: 20px;
      font-size: 26px;
      font-weight: bold;
    }

    .container {
      padding: 30px;
    }

    .tier {
      background: #222;
      margin: 15px auto;
      padding: 15px;
      width: 80%;
      border-left: 6px solid pink;
      text-align: left;
    }
  </style>
</head>
<body>

<header>
  Pink & White Tier Platform
</header>

<div class="container">
  <h2>Sword Tiers</h2>

  <div class="tier">Coal</div>
  <div class="tier">Copper</div>
  <div class="tier">Iron</div>
  <div class="tier">Gold</div>
  <div class="tier">Emerald</div>
  <div class="tier">Diamond</div>
  <div class="tier">Emerald</div>
</div>

</body>
</html>
