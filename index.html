<!DOCTYPE html>
<html>
<head>
  <title>Quipalite MC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0f0f0f;
      color: white;
    }

    header {
      background: linear-gradient(90deg, #ff69b4, #ffffff);
      color: black;
      text-align: center;
      padding: 30px;
      font-size: 32px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 30px;
    }

    .player {
      background: #1a1a1a;
      margin: 15px 0;
      padding: 15px;
      border-radius: 10px;
      border-left: 5px solid #ff69b4;
      cursor: pointer;
      transition: 0.2s;
    }

    .player:hover {
      background: #222;
    }

    .details {
      display: none;
      margin-top: 10px;
      padding: 10px;
      background: #141414;
      border-radius: 8px;
    }

    .rank {
      margin: 5px 0;
      color: #ffb6c1;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #888;
      font-size: 14px;
    }
  </style>
</head>

<body>

<header>
  Quipalite MC
</header>

<div class="container">

  <h2>Players</h2>

  <!-- Player 1 -->
  <div class="player" onclick="toggleDetails('p1')">
    PlayerOne
    <div class="details" id="p1">
      <div class="rank">Sword: Diamond</div>
      <div class="rank">Axe: Gold</div>
      <div class="rank">UHC: Emerald</div>
      <div class="rank">Mace: Iron</div>
      <div class="rank">Spear: Coal</div>
    </div>
  </div>

  <!-- Player 2 -->
  <div class="player" onclick="toggleDetails('p2')">
    PlayerTwo
    <div class="details" id="p2">
      <div class="rank">Sword: Gold</div>
      <div class="rank">Axe: Diamond</div>
      <div class="rank">UHC: Iron</div>
      <div class="rank">Mace: Emerald</div>
      <div class="rank">Spear: Copper</div>
    </div>
  </div>

</div>

<footer>
  © 2026 Quipalite MC
</footer>

<script>
function toggleDetails(id) {
  var element = document.getElementById(id);
  if (element.style.display === "block") {
    element.style.display = "none";
  } else {
    element.style.display = "block";
  }
}
</script>

</body>
</html>
