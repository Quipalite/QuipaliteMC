<!DOCTYPE html>
<html>
<head>
  <title>Quipalite MC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0f0f0f;
      color: white;
    }

    header {
      background: linear-gradient(90deg, #ff69b4, #ffffff);
      color: black;
      text-align: center;
      padding: 30px;
      font-size: 32px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 30px;
    }

    h2 {
      color: #ffb6c1;
      margin-bottom: 20px;
    }

    .player {
      background: #1a1a1a;
      margin: 15px 0;
      padding: 18px;
      border-radius: 10px;
      border-left: 5px solid #ff69b4;
      cursor: pointer;
      transition: 0.2s ease;
      font-weight: 600;
    }

    .player:hover {
      background: #222;
      transform: translateX(4px);
    }

    .details {
      display: none;
      margin-top: 12px;
      padding: 12px;
      background: #141414;
      border-radius: 8px;
    }

    .rank {
      margin: 6px 0;
      font-weight: bold;
    }

    /* Rank Colors */
    .coal { color: #808080; }
    .copper { color: #b87333; }
    .iron { color: #dcdcdc; }
    .gold { color: #ffd700; }
    .emerald { color: #50c878; }
    .diamond { color: #4fc3f7; }

    footer {
      text-align: center;
      padding: 20px;
      color: #888;
      font-size: 14px;
    }
  </style>
</head>

<body>

<header>
  Quipalite MC
</header>

<div class="container">

  <h2>Players</h2>

  <div class="player" onclick="toggleDetails('p1')">
    1. PlayerOne
    <div class="details" id="p1">
      <div class="rank diamond">Sword: Diamond</div>
      <div class="rank gold">Axe: Gold</div>
      <div class="rank emerald">UHC: Emerald</div>
      <div class="rank iron">Mace: Iron</div>
      <div class="rank coal">Spear: Coal</div>
    </div>
  </div>

  <div class="player" onclick="toggleDetails('p2')">
    2. PlayerTwo
    <div class="details" id="p2">
      <div class="rank gold">Sword: Gold</div>
      <div class="rank diamond">Axe: Diamond</div>
      <div class="rank iron">UHC: Iron</div>
      <div class="rank emerald">Mace: Emerald</div>
      <div class="rank copper">Spear: Copper</div>
    </div>
  </div>

</div>

<footer>
  © 2026 Quipalite MC
</footer>

<script>
function toggleDetails(id) {
  var element = document.getElementById(id);
  element.style.display =
    (element.style.display === "block") ? "none" : "block";
}
</script>

</body>
</html>
