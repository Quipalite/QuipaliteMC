<!DOCTYPE html>
<html>
<head>
  <title>Quipalite MC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:Segoe UI, Arial, sans-serif;
      background:#0a0a0a;
      color:white;
    }

    header{
      background:linear-gradient(90deg,#ff1493,#000);
      text-align:center;
      padding:30px;
      font-size:32px;
      font-weight:bold;
      border-bottom:3px solid #ff1493;
    }

    .arrow-btn{
      position:fixed;
      top:15px;
      right:15px;
      z-index:1000;
      background:#ff1493;
      border:none;
      color:white;
      padding:10px 14px;
      border-radius:8px;
      font-size:18px;
      cursor:pointer;
    }

    .tabs{
      text-align:center;
      margin:20px 0;
    }

    .tab{
      background:#141414;
      border:1px solid #ff1493;
      color:white;
      padding:8px 12px;
      margin:4px;
      border-radius:6px;
      cursor:pointer;
      font-weight:bold;
    }

    .tab.active{ background:#ff1493; }

    .container{
      max-width:900px;
      margin:auto;
      padding:20px;
    }

    .mode{ display:none; }
    .mode.active{ display:block; }

    .player{
      background:#141414;
      margin:12px 0;
      padding:16px;
      border-radius:10px;
      border:1px solid #ff1493;
      cursor:pointer;
      transition:0.3s ease;
    }

    .player:hover{
      transform:translateY(-3px);
      box-shadow:0 6px 18px rgba(255,20,147,0.4);
    }

    .gold-glow{ border:2px solid gold; box-shadow:0 0 16px gold; }
    .silver-glow{ border:2px solid silver; box-shadow:0 0 14px silver; }
    .bronze-glow{ border:2px solid #cd7f32; box-shadow:0 0 12px #cd7f32; }

    .number{
      display:inline-block;
      padding:4px 10px;
      border-radius:15px;
      font-weight:bold;
      margin-right:6px;
    }

    .gold{ background:gold; color:black; }
    .silver{ background:silver; color:black; }
    .bronze{ background:#cd7f32; color:white; }

    .crown{
      margin-left:5px;
      text-shadow:0 0 8px gold;
    }

    .details{
      max-height:0;
      overflow:hidden;
      margin-top:0;
      padding:0 12px;
      background:#0f0f0f;
      border-left:3px solid #ff69b4;
      border-radius:6px;
      transition:0.3s ease;
    }

    .details.open{
      max-height:250px;
      margin-top:10px;
      padding:12px;
    }

    .stat{
      margin:4px 0;
    }

  </style>
</head>

<body>

<header>Quipalite MC</header>

<button id="sortArrow" class="arrow-btn" onclick="toggleSort()">⬆</button>

<div class="tabs">
  <button class="tab active" onclick="showMode('overall', this)">Overall</button>
  <button class="tab" onclick="showMode('sword', this)">Sword</button>
  <button class="tab" onclick="showMode('axe', this)">Axe</button>
  <button class="tab" onclick="showMode('uhc', this)">UHC</button>
  <button class="tab" onclick="showMode('mace', this)">Mace</button>
  <button class="tab" onclick="showMode('spear', this)">Spear</button>
</div>

<div class="container">

<!-- OVERALL -->
<div id="overall" class="mode active">
  <!-- Players 1–5 (same structure) -->
  <!-- Copy this block for each mode below -->
</div>

<div id="sword" class="mode"></div>
<div id="axe" class="mode"></div>
<div id="uhc" class="mode"></div>
<div id="mace" class="mode"></div>
<div id="spear" class="mode"></div>

</div>

<script>

let sortLowToHigh = true;

function createPlayers(prefix, containerId){
  const container = document.getElementById(containerId);

  for(let i=1;i<=5;i++){

    let glow="";
    let numberClass="";

    if(i===1){ glow="gold-glow"; numberClass="gold"; }
    if(i===2){ glow="silver-glow"; numberClass="silver"; }
    if(i===3){ glow="bronze-glow"; numberClass="bronze"; }

    container.innerHTML += `
      <div class="player ${glow}" data-number="${i}" onclick="toggle('${prefix}${i}')">
        <span class="number ${numberClass}">#${i}</span>
        ${i===1?'<span class="crown">👑</span>':''}
        <b>Player ${i}</b>
        <div class="details" id="${prefix}${i}">
          <div class="stat">Rank: #${i}</div>
          <div class="stat">Wins: 10</div>
          <div class="stat">Kills: 50</div>
          <div class="stat">Deaths: 20</div>
        </div>
      </div>
    `;
  }
}

function init(){
  createPlayers("o","overall");
  createPlayers("s","sword");
  createPlayers("a","axe");
  createPlayers("u","uhc");
  createPlayers("m","mace");
  createPlayers("sp","spear");
}

init();

function toggle(id){
  document.getElementById(id).classList.toggle("open");
}

function showMode(mode, btn){
  document.querySelectorAll(".mode").forEach(m=>m.classList.remove("active"));
  document.getElementById(mode).classList.add("active");

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  btn.classList.add("active");

  sortActive();
}

function toggleSort(){
  sortLowToHigh = !sortLowToHigh;
  document.getElementById("sortArrow").textContent = sortLowToHigh ? "⬆" : "⬇";
  sortActive();
}

function sortActive(){
  const active = document.querySelector(".mode.active");
  const players = Array.from(active.querySelectorAll(".player"));

  players.sort((a,b)=>{
    const numA = Number(a.dataset.number);
    const numB = Number(b.dataset.number);
    return sortLowToHigh ? numA - numB : numB - numA;
  });

  players.forEach(p=>active.appendChild(p));
}

</script>

</body>
</html>
