<!DOCTYPE html>
<html>
<head>
  <title>Quipalite MC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:Segoe UI, Arial, sans-serif;
      background:#000;
      color:white;
      overflow-x:hidden;
    }

    header{
      text-align:center;
      padding:45px 20px;
      font-size:44px;
      font-weight:900;
      letter-spacing:3px;
      background:linear-gradient(90deg,#ff2db2,#ff66cc,#ff1493,#ff2db2);
      background-size:300% 300%;
      animation:bannerMove 5s ease infinite;
      border-bottom:3px solid #ff66cc;
    }

    @keyframes bannerMove{
      0%{background-position:0% 50%;}
      50%{background-position:100% 50%;}
      100%{background-position:0% 50%;}
    }

    .arrow-btn{
      position:fixed;
      top:20px;
      right:20px;
      z-index:9999;
      background:#ff1493;
      border:none;
      color:white;
      padding:12px 16px;
      border-radius:10px;
      font-size:18px;
      font-weight:bold;
      cursor:pointer;
      box-shadow:0 0 12px #ff1493;
    }

    .tabs{
      text-align:center;
      margin:20px 0;
    }

    .tab{
      background:#111;
      border:1px solid #ff1493;
      color:white;
      padding:8px 14px;
      margin:5px;
      border-radius:6px;
      cursor:pointer;
      font-weight:bold;
    }

    .tab.active{background:#ff1493;}

    #searchInput{
      width:250px;
      padding:10px;
      border-radius:8px;
      border:1px solid #ff1493;
      background:#111;
      color:white;
      font-weight:bold;
      outline:none;
    }

    .container{
      max-width:900px;
      margin:auto;
      padding:20px;
    }

    .mode{display:none;}
    .mode.active{display:block;}

    .player{
      background:#111;
      margin:12px 0;
      padding:18px;
      border-radius:12px;
      border:1px solid #ff1493;
      cursor:pointer;
      transition:0.3s ease;
    }

    .player:hover{
      transform:translateY(-4px);
      box-shadow:0 8px 25px rgba(255,20,147,0.4);
    }

    .gold-glow{border:2px solid gold;box-shadow:0 0 16px gold;}
    .silver-glow{border:2px solid silver;box-shadow:0 0 14px silver;}
    .bronze-glow{border:2px solid #cd7f32;box-shadow:0 0 12px #cd7f32;}

    .number{
      display:inline-block;
      padding:5px 11px;
      border-radius:20px;
      font-weight:bold;
      margin-right:8px;
    }

    .gold{background:gold;color:black;}
    .silver{background:silver;color:black;}
    .bronze{background:#cd7f32;color:white;}

    .crown{
      margin-left:6px;
      text-shadow:0 0 10px gold;
    }

    .details{
      max-height:0;
      overflow:hidden;
      margin-top:0;
      padding:0 14px;
      background:#0a0a0a;
      border-left:3px solid #ff69b4;
      border-radius:8px;
      transition:0.3s ease;
    }

    .details.open{
      max-height:250px;
      margin-top:12px;
      padding:14px;
    }

    .stat{
      margin:6px 0;
      font-weight:700;
    }

    /* 🔥 CONFETTI (IMPROVED) */
    .confetti{
      position:fixed;
      top:0;
      z-index:9999;
      pointer-events:none;
      border-radius:2px;
      animation:fall forwards;
    }

    @keyframes fall{
      to{
        transform:
          translateY(110vh)
          translateX(var(--drift))
          rotate(var(--rotate));
        opacity:0;
      }
    }

  </style>
</head>

<body>

<header>QUIPALITE MC</header>

<button class="arrow-btn" onclick="toggleSort()" id="sortBtn">⬆</button>

<div class="tabs">
  <button class="tab active" onclick="showMode('overall', this)">Overall</button>
  <button class="tab" onclick="showMode('sword', this)">Sword</button>
  <button class="tab" onclick="showMode('axe', this)">Axe</button>
  <button class="tab" onclick="showMode('uhc', this)">UHC</button>
  <button class="tab" onclick="showMode('mace', this)">Mace</button>
  <button class="tab" onclick="showMode('spear', this)">Spear</button>
</div>

<div style="text-align:center;margin-bottom:15px;">
  <input type="text" id="searchInput" placeholder="Search player..." onkeyup="searchPlayers()">
</div>

<div class="container">
  <div id="overall" class="mode active"></div>
  <div id="sword" class="mode"></div>
  <div id="axe" class="mode"></div>
  <div id="uhc" class="mode"></div>
  <div id="mace" class="mode"></div>
  <div id="spear" class="mode"></div>
</div>

<script>

let sortLowToHigh = true;

/* Create Players */
function createPlayers(prefix, containerId){
  const container = document.getElementById(containerId);

  for(let i=1;i<=15;i++){

    let glow="";
    let numberClass="";

    if(i===1){glow="gold-glow";numberClass="gold";}
    if(i===2){glow="silver-glow";numberClass="silver";}
    if(i===3){glow="bronze-glow";numberClass="bronze";}

    container.innerHTML += `
      <div class="player ${glow}" data-number="${i}" onclick="handleClick(${i}, '${prefix}${i}')">
        <span class="number ${numberClass}">#${i}</span>
        ${i===1?'<span class="crown">👑</span>':''}
        <b>Player ${i}</b>

        <div class="details" id="${prefix}${i}">
          <div class="stat">Rank: #${i}</div>
          <div class="stat">Wins: 10</div>
          <div class="stat">Kills: 50</div>
          <div class="stat">Deaths: 20</div>
        </div>
      </div>
    `;
  }
}

/* Toggle Details + Confetti */
function handleClick(number,id){
  const el=document.getElementById(id);
  const opening=!el.classList.contains("open");
  el.classList.toggle("open");

  if(number===1 && opening){
    launchConfetti();
  }
}

/* 🔥 IMPROVED CONFETTI FUNCTION */
function launchConfetti(){

  const colors=["#ff1493","#ff66cc","#ffd700","#ffffff","#00ffff","#ff4d4d"];

  for(let i=0;i<180;i++){

    const piece=document.createElement("div");
    piece.classList.add("confetti");

    const size=Math.random()*14+6;
    piece.style.width=size+"px";
    piece.style.height=size*0.6+"px";

    piece.style.left=Math.random()*100+"vw";

    piece.style.background=
      colors[Math.floor(Math.random()*colors.length)];

    const duration=Math.random()*3+2;
    piece.style.animationDuration=duration+"s";

    const drift=(Math.random()*400-200)+"px";
    piece.style.setProperty("--drift",drift);

    const rotate=(Math.random()>0.5?1:-1)*
                 (720+Math.random()*720);
    piece.style.setProperty("--rotate",rotate+"deg");

    document.body.appendChild(piece);

    setTimeout(()=>piece.remove(),6000);
  }
}

/* Search */
function searchPlayers(){
  const value=document.getElementById("searchInput").value.toLowerCase();
  const active=document.querySelector(".mode.active");
  active.querySelectorAll(".player").forEach(p=>{
    const name=p.querySelector("b").textContent.toLowerCase();
    p.style.display=name.includes(value)?"block":"none";
  });
}

/* Sort */
function toggleSort(){
  sortLowToHigh=!sortLowToHigh;
  document.getElementById("sortBtn").textContent=sortLowToHigh?"⬆":"⬇";
  sortActive();
}

function sortActive(){
  const active=document.querySelector(".mode.active");
  const players=Array.from(active.querySelectorAll(".player"));
  players.sort((a,b)=>{
    return sortLowToHigh
      ? a.dataset.number-b.dataset.number
      : b.dataset.number-a.dataset.number;
  });
  players.forEach(p=>active.appendChild(p));
}

/* Tabs */
function showMode(mode,btn){
  document.querySelectorAll(".mode").forEach(m=>m.classList.remove("active"));
  document.getElementById(mode).classList.add("active");
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  btn.classList.add("active");
}

/* Init */
createPlayers("o","overall");
createPlayers("s","sword");
createPlayers("a","axe");
createPlayers("u","uhc");
createPlayers("m","mace");
createPlayers("sp","spear");

</script>

</body>
</html>
