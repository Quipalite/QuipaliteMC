<!DOCTYPE html>
<html>
<head>
  <title>Quipalite MC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:Segoe UI, Arial, sans-serif;
      background:#000;
      color:white;
      overflow-x:hidden;
    }

    header{
      text-align:center;
      padding:45px 20px;
      font-size:44px;
      font-weight:900;
      letter-spacing:3px;
      background:linear-gradient(90deg,#ff2db2,#ff66cc,#ff1493,#ff2db2);
      background-size:300% 300%;
      animation:bannerMove 5s ease infinite;
      border-bottom:3px solid #ff66cc;
    }

    @keyframes bannerMove{
      0%{background-position:0% 50%;}
      50%{background-position:100% 50%;}
      100%{background-position:0% 50%;}
    }

    .tabs{
      text-align:center;
      margin:20px 0;
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .tab{
      background:#111;
      border:1px solid #ff1493;
      color:white;
      padding:6px 12px;
      border-radius:6px;
      cursor:pointer;
      font-weight:bold;
      transition:0.2s ease;
    }

    .tab:hover{transform:scale(1.05);}
    .tab.active{background:#ff1493;}

    #searchInput{
      width:250px;
      padding:10px;
      border-radius:8px;
      border:1px solid #ff1493;
      background:#111;
      color:white;
      font-weight:bold;
      outline:none;
    }

    .container{
      max-width:900px;
      min-height:500px;
      margin:auto;
      padding:20px;
      position:relative;
    }

    .mode{display:none;}
    .mode.active{display:block;}

    .player{
      background:#111;
      margin:12px 0;
      padding:18px;
      border-radius:12px;
      border:1px solid #ff1493;
      cursor:pointer;
      transition:transform 0.2s ease, box-shadow 0.2s ease;
      display:flex;
      align-items:center;
      opacity:0;
      transform:translateY(20px) scale(0.97);
      animation:fadeSlide 0.5s ease forwards;
    }

    .player:hover{
      transform:translateY(0) scale(1.03);
      box-shadow:0 0 14px #ff1493;
    }

    @keyframes fadeSlide{
      to{
        opacity:1;
        transform:translateY(0) scale(1);
      }
    }

    .gold-glow{border:2px solid gold;box-shadow:0 0 16px gold;}
    .silver-glow{border:2px solid silver;box-shadow:0 0 14px silver;}
    .bronze-glow{border:2px solid #cd7f32;box-shadow:0 0 12px #cd7f32;}

    .number{
      display:inline-block;
      padding:6px 12px;
      border-radius:50%;
      font-weight:bold;
      margin-right:12px;
      min-width:30px;
      text-align:center;
    }

    .gold{background:gold;color:black;}
    .silver{background:silver;color:black;}
    .bronze{background:#cd7f32;color:white;}

    #profilePage{
      display:none;
      max-width:700px;
      margin:auto;
      padding:20px;
      opacity:0;
      transform:translateY(20px);
      transition:0.3s ease;
    }

    #profilePage.show{
      opacity:1;
      transform:translateY(0);
    }

    #profileContent{
      background:#111;
      padding:20px;
      border-radius:12px;
      border:1px solid #ff1493;
    }

    .backBtn{
      background:#ff1493;
      border:none;
      padding:10px 16px;
      color:white;
      font-weight:bold;
      border-radius:8px;
      cursor:pointer;
      margin-bottom:20px;
    }

    .stat-bar{
      background:#1a1a1a;
      height:8px;
      border-radius:6px;
      margin-bottom:15px;
      overflow:hidden;
    }

    .stat-fill{
      height:100%;
      width:0%;
      background:linear-gradient(90deg,#ff1493,#ff66cc);
      transition:width 1s ease;
    }

    /* No players found text */
    .no-results{
      position:absolute;
      top:20px;
      left:50%;
      transform:translateX(-50%) translateY(-20px);
      text-align:center;
      font-weight:bold;
      font-size:28px;
      color:transparent;
      background:linear-gradient(90deg,#ff2db2,#ff66cc,#ff1493,#ff2db2);
      -webkit-background-clip: text;
      background-clip: text;
      display:none;
      opacity:0;
      animation:slideFadeIn 0.8s ease forwards;
    }

    @keyframes slideFadeIn{
      0%{
        opacity:0;
        transform:translateX(-50%) translateY(-20px);
      }
      100%{
        opacity:1;
        transform:translateX(-50%) translateY(0);
      }
    }

  </style>
</head>

<body>

<header>QUIPALITE MC</header>

<div class="tabs">
  <button class="tab active" onclick="showMode('overall', this)">Overall</button>
  <button class="tab" onclick="showMode('sword', this)">Sword</button>
  <button class="tab" onclick="showMode('axe', this)">Axe</button>
  <button class="tab" onclick="showMode('uhc', this)">UHC</button>
  <button class="tab" onclick="showMode('mace', this)">Mace</button>
  <button class="tab" onclick="showMode('spear', this)">Spear</button>
</div>

<div style="text-align:center;margin-bottom:15px;">
  <input type="text" id="searchInput" placeholder="Search player..." onkeyup="searchPlayers()">
</div>

<div class="container">
  <div id="overall" class="mode active"></div>
  <div id="sword" class="mode"></div>
  <div id="axe" class="mode"></div>
  <div id="uhc" class="mode"></div>
  <div id="mace" class="mode"></div>
  <div id="spear" class="mode"></div>
  <div class="no-results">No players found</div>
</div>

<div id="profilePage">
  <button class="backBtn" onclick="goBack()">⬅ Back</button>
  <div id="profileContent"></div>
</div>

<script>
const playerStats={
  sword:{
    RealO75:{wins:3,kills:9,deaths:4},
    Jai_B37:{wins:1,kills:3,deaths:1},
    skull_shredder30:{wins:1,kills:3,deaths:1},
    Killedbycrab:{wins:0,kills:3,deaths:6},
    Knoxy5316:{wins:0,kills:1,deaths:4},
    EggyCactus78246:{wins:1,kills:3,deaths:0}
  },
  axe:{
    Killedbycrab:{wins:2,kills:6,deaths:1},
    Jai_B37:{wins:1,kills:3,deaths:0},
    skull_shredder30:{wins:0,kills:1,deaths:3},
    "Yearly-scuff81":{wins:0,kills:0,deaths:3},
    Knoxy5316:{wins:0,kills:0,deaths:3}
  },
  uhc:{Killedbycrab:{wins:1,kills:3,deaths:0},"Yearly-scuff81":{wins:0,kills:0,deaths:3}},
  mace:{
    Killedbycrab:{wins:8,kills:24,deaths:4},
    "Yearly-scuff81":{wins:0,kills:3,deaths:15},
    Aftlow:{wins:0,kills:0,deaths:3},
    Knoxy5316:{wins:0,kills:1,deaths:10},
    EggyCactus78246:{wins:1,kills:3,deaths:0}
  },
  spear:{Killedbycrab:{wins:1,kills:3,deaths:0},Aftlow:{wins:1,kills:3,deaths:1},"Yearly-scuff81":{wins:0,kills:1,deaths:6}}
};

const customTiers={
  sword:{Killedbycrab:"Gold"},
  axe:{Killedbycrab:"Emerald"},
  uhc:{Killedbycrab:"Gold"},
  mace:{Killedbycrab:"Diamond"},
  spear:{Killedbycrab:"Gold"},
  overall:{Killedbycrab:"Emerald"}
};

function updateOverall(){
  const overall={};
  for(const mode in playerStats){
    if(mode==='overall') continue;
    for(const player in playerStats[mode]){
      if(!overall[player]) overall[player]={wins:0,kills:0,deaths:0};
      overall[player].wins+=playerStats[mode][player].wins;
      overall[player].kills+=playerStats[mode][player].kills;
      overall[player].deaths+=playerStats[mode][player].deaths;
    }
  }
  playerStats.overall=overall;
}

function getOrderedPlayers(mode){
  if(mode==='overall') updateOverall();
  return Object.entries(playerStats[mode])
    .sort((a,b)=>{
      if(b[1].wins!==a[1].wins) return b[1].wins-a[1].wins;
      if(b[1].kills!==a[1].kills) return b[1].kills-a[1].kills;
      return a[1].deaths-b[1].deaths;
    })
    .map(e=>e[0]);
}

function createPlayers(mode){
  const container=document.getElementById(mode);
  const players=getOrderedPlayers(mode);
  container.innerHTML='';
  players.forEach((name,i)=>{
    let glow='',numberClass='';
    if(i===0){glow='gold-glow';numberClass='gold';}
    if(i===1){glow='silver-glow';numberClass='silver';}
    if(i===2){glow='bronze-glow';numberClass='bronze';}
    const card=document.createElement('div');
    card.className=`player ${glow}`;
    card.style.animationDelay=`${i*0.07}s`;
    card.onclick=()=>openProfile(name,mode);
    card.innerHTML=`<span class="number ${numberClass}">#${i+1}</span><b>${name}</b>`;
    container.appendChild(card);
  });
  // reset no results text when switching tabs
  document.querySelector('.no-results').style.display='none';
}

function openProfile(name,mode){
  const stats=playerStats[mode][name];
  const ranking=getOrderedPlayers(mode);
  const rank=ranking.indexOf(name)+1;
  const kd=stats.deaths===0?'∞':(stats.kills/stats.deaths).toFixed(2);
  const tier=customTiers[mode]?.[name]||"Tier IV";
  document.getElementById('profileContent').innerHTML=`
    <h2 style="color:#ff69b4;margin-top:0;">${name}</h2>
    <h3 style="color:gold;margin-top:-8px;">${tier}</h3>
    <div style="display:flex;justify-content:space-between;
    margin:15px 0 20px 0;background:#0d0d0d;padding:12px 16px;
    border-radius:10px;border:1px solid #ff1493;font-weight:bold;">
      <div>K/D: <span style="color:#ff66cc">${kd}</span></div>
      <div>Rank: <span style="color:#ff66cc">#${rank}</span></div>
    </div>
    <p><b>Wins:</b> ${stats.wins}</p>
    <div class="stat-bar"><div class="stat-fill" id="winsBar"></div></div>
    <p><b>Kills:</b> ${stats.kills}</p>
    <div class="stat-bar"><div class="stat-fill" id="killsBar"></div></div>
    <p><b>Deaths:</b> ${stats.deaths}</p>
    <div class="stat-bar"><div class="stat-fill" id="deathsBar"></div></div>
  `;
  document.querySelector('.tabs').style.display='none';
  document.querySelector('.container').style.display='none';
  document.getElementById('searchInput').style.display='none';
  const profile=document.getElementById('profilePage');
  profile.style.display='block';
  setTimeout(()=>{profile.classList.add('show');animateBars(stats);},10);
}

function animateBars(stats){
  const max=Math.max(stats.wins,stats.kills,stats.deaths,1);
  document.getElementById('winsBar').style.width=(stats.wins/max*100)+"%";
  document.getElementById('killsBar').style.width=(stats.kills/max*100)+"%";
  document.getElementById('deathsBar').style.width=(stats.deaths/max*100)+"%";
}

function goBack(){
  const profile=document.getElementById('profilePage');
  profile.classList.remove('show');
  setTimeout(()=>{
    profile.style.display='none';
    document.querySelector('.tabs').style.display='flex';
    document.querySelector('.container').style.display='block';
    document.getElementById('searchInput').style.display='inline-block';
  },300);
}

function searchPlayers(){
  const value=document.getElementById('searchInput').value.toLowerCase();
  const active=document.querySelector('.mode.active');
  let found=false;
  active.querySelectorAll('.player').forEach(p=>{
    const name=p.querySelector('b').textContent.toLowerCase();
    if(name.includes(value)){
      p.style.display='flex';
      found=true;
    } else {
      p.style.display='none';
    }
  });
  const noResults=document.querySelector('.no-results');
  if(!found && value.length>0){
    noResults.style.display='block';
    noResults.style.animation='slideFadeIn 0.8s ease forwards';
  } else {
    noResults.style.display='none';
  }
}

function showMode(mode,btn){
  document.querySelectorAll('.mode').forEach(m=>m.classList.remove('active'));
  document.getElementById(mode).classList.add('active');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  createPlayers(mode);
}

['sword','axe','uhc','mace','spear'].forEach(createPlayers);
createPlayers('overall');
</script>

</body>
</html>
