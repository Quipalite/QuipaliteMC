<!DOCTYPE html>
<html>
<head>
  <title>Quipalite MC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:Segoe UI, Arial, sans-serif;
      background:#0a0a0a;
      color:white;
    }

    header{
      background:linear-gradient(90deg,#ff1493,#000);
      text-align:center;
      padding:30px;
      font-size:32px;
      font-weight:bold;
      border-bottom:3px solid #ff1493;
    }

    .container{
      max-width:900px;
      margin:auto;
      padding:30px;
    }

    .player{
      background:#141414;
      margin:15px 0;
      padding:18px;
      border-radius:12px;
      border:1px solid #ff1493;
      cursor:pointer;
      transition:0.2s ease;
    }

    .player:hover{
      box-shadow:0 0 12px rgba(255,20,147,0.6);
    }

    .number{
      display:inline-block;
      padding:5px 12px;
      border-radius:20px;
      font-weight:bold;
      margin-right:8px;
    }

    .gold{ background:gold; color:black; }
    .silver{ background:silver; color:black; }
    .bronze{ background:#cd7f32; color:white; }

    .crown{
      margin-left:6px;
      animation:glow 1.5s infinite alternate;
    }

    @keyframes glow{
      from{ text-shadow:0 0 5px gold; }
      to{ text-shadow:0 0 15px gold; }
    }

    .details{
      max-height:0;
      overflow:hidden;
      margin-top:0;
      padding:0 15px;
      background:#0f0f0f;
      border-left:3px solid #ff69b4;
      border-radius:8px;
      transition:0.3s ease;
    }

    .details.open{
      max-height:500px;
      margin-top:12px;
      padding:15px;
    }

    .stat{
      margin:6px 0;
      font-weight:bold;
    }

    .white{ color:white; font-size:16px; }
    .diamond{ color:#00bfff; }
    .goldc{ color:#ffd700; }
    .emerald{ color:#2ecc71; }
    .iron{ color:#e0e0e0; }
    .coal{ color:#888; }

  </style>
</head>

<body>

<header>Quipalite MC</header>

<div class="container">

  <!-- Player 1 -->
  <div class="player" onclick="toggle('p1')">
    <span class="number gold">#1</span>
    <span class="crown">👑</span>
    <b>PlayerOne</b>

    <div class="details" id="p1">
      <div class="stat white">Sword: <span class="diamond">Diamond</span></div>
      <div class="stat white">Axe: <span class="goldc">Gold</span></div>
      <div class="stat white">UHC: <span class="emerald">Emerald</span></div>
      <div class="stat white">Mace: <span class="iron">Iron</span></div>
      <div class="stat white">Spear: <span class="coal">Coal</span></div>
    </div>
  </div>

  <!-- Player 2 -->
  <div class="player" onclick="toggle('p2')">
    <span class="number silver">#2</span>
    <b>PlayerTwo</b>

    <div class="details" id="p2">
      <div class="stat white">Sword: <span class="diamond">Diamond</span></div>
      <div class="stat white">Axe: <span class="goldc">Gold</span></div>
      <div class="stat white">UHC: <span class="emerald">Emerald</span></div>
      <div class="stat white">Mace: <span class="iron">Iron</span></div>
      <div class="stat white">Spear: <span class="coal">Coal</span></div>
    </div>
  </div>

  <!-- Player 3 -->
  <div class="player" onclick="toggle('p3')">
    <span class="number bronze">#3</span>
    <b>PlayerThree</b>

    <div class="details" id="p3">
      <div class="stat white">Sword: <span class="diamond">Diamond</span></div>
      <div class="stat white">Axe: <span class="goldc">Gold</span></div>
      <div class="stat white">UHC: <span class="emerald">Emerald</span></div>
      <div class="stat white">Mace: <span class="iron">Iron</span></div>
      <div class="stat white">Spear: <span class="coal">Coal</span></div>
    </div>
  </div>

</div>

<script>
function toggle(id){
  document.getElementById(id).classList.toggle("open");
}
</script>
