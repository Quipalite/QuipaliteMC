!DOCTYPE html>
<html>
<head>
  <title>Quipalite MC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:Segoe UI, Arial, sans-serif;
      background:#000000; /* pure black */
      color:white;
      overflow-x:hidden;
    }

    /* 🎀 Animated Pink Banner */
    header{
      text-align:center;
      padding:45px 20px;
      font-size:44px;
      font-weight:900;
      letter-spacing:3px;

      background: linear-gradient(
        90deg,
        #ff2db2,
        #ff66cc,
        #ff1493,
        #ff2db2
      );

      background-size:300% 300%;
      animation: bannerMove 5s ease infinite;

      color:white;

      border-bottom:3px solid #ff66cc;

      transition:0.3s ease;
    }

    @keyframes bannerMove{
      0%{ background-position:0% 50%; }
      50%{ background-position:100% 50%; }
      100%{ background-position:0% 50%; }
    }

    header:hover{
      transform:scale(1.05);
      box-shadow:0 0 25px rgba(255,45,178,0.8);
    }

    .arrow-btn{
      position:fixed;
      top:15px;
      right:15px;
      z-index:1000;
      background:#ff1493;
      border:none;
      color:white;
      padding:10px 14px;
      border-radius:8px;
      font-size:18px;
      cursor:pointer;
      box-shadow:0 0 10px #ff1493;
    }

    .tabs{
      text-align:center;
      margin:25px 0;
    }

    .tab{
      background:#111;
      border:1px solid #ff1493;
      color:white;
      padding:8px 14px;
      margin:5px;
      border-radius:6px;
      cursor:pointer;
      font-weight:bold;
      transition:0.2s;
    }

    .tab:hover{
      box-shadow:0 0 10px #ff1493;
    }

    .tab.active{ background:#ff1493; }

    .container{
      max-width:900px;
      margin:auto;
      padding:20px;
    }

    .mode{ display:none; }
    .mode.active{ display:block; }

    .player{
      background:#111;
      margin:12px 0;
      padding:18px;
      border-radius:12px;
      border:1px solid #ff1493;
      cursor:pointer;
      transition:0.3s ease;
    }

    .player:hover{
      transform:translateY(-4px);
      box-shadow:0 8px 25px rgba(255,20,147,0.4);
    }

    .gold-glow{ border:2px solid gold; box-shadow:0 0 16px gold; }
    .silver-glow{ border:2px solid silver; box-shadow:0 0 14px silver; }
    .bronze-glow{ border:2px solid #cd7f32; box-shadow:0 0 12px #cd7f32; }

    .number{
      display:inline-block;
      padding:5px 11px;
      border-radius:20px;
      font-weight:bold;
      margin-right:8px;
    }

    .gold{ background:gold; color:black; }
    .silver{ background:silver; color:black; }
    .bronze{ background:#cd7f32; color:white; }

    .crown{
      margin-left:6px;
      text-shadow:0 0 10px gold;
    }

    .details{
      max-height:0;
      overflow:hidden;
      margin-top:0;
      padding:0 14px;
      background:#0a0a0a;
      border-left:3px solid #ff69b4;
      border-radius:8px;
      transition:0.3s ease;
    }

    .details.open{
      max-height:250px;
      margin-top:12px;
      padding:14px;
    }

    .stat{
      margin:6px 0;
      font-size:15px;
      font-weight:700;
      color:#ffffff;
    }

    /* 🎉 Confetti */
    .confetti{
      position:fixed;
      width:10px;
      height:10px;
      top:-10px;
      z-index:9999;
      pointer-events:none;
      animation:fall 3s linear forwards;
    }

    @keyframes fall{
      to{
        transform:translateY(110vh) rotate(720deg);
        opacity:0;
      }
    }

  </style>
</head>

<body>

<header>QUIPALITE MC</header>

<button id="sortArrow" class="arrow-btn" onclick="toggleSort()">⬆</button>

<div class="tabs">
  <button class="tab active" onclick="showMode('overall', this)">Overall</button>
  <button class="tab" onclick="showMode('sword', this)">Sword</button>
  <button class="tab" onclick="showMode('axe', this)">Axe</button>
  <button class="tab" onclick="showMode('uhc', this)">UHC</button>
  <button class="tab" onclick="showMode('mace', this)">Mace</button>
  <button class="tab" onclick="showMode('spear', this)">Spear</button>
</div>

<div class="container">
  <div id="overall" class="mode active"></div>
  <div id="sword" class="mode"></div>
  <div id="axe" class="mode"></div>
  <div id="uhc" class="mode"></div>
  <div id="mace" class="mode"></div>
  <div id="spear" class="mode"></div>
</div>

<script>

let sortLowToHigh = true;

function createPlayers(prefix, containerId){
  const container = document.getElementById(containerId);

  for(let i=1;i<=15;i++){

    let glow="";
    let numberClass="";

    if(i===1){ glow="gold-glow"; numberClass="gold"; }
    if(i===2){ glow="silver-glow"; numberClass="silver"; }
    if(i===3){ glow="bronze-glow"; numberClass="bronze"; }

    container.innerHTML += `
      <div class="player ${glow}" data-number="${i}" onclick="handleClick(${i}, '${prefix}${i}')">
        <span class="number ${numberClass}">#${i}</span>
        ${i===1?'<span class="crown">👑</span>':''}
        <b>Player ${i}</b>

        <div class="details" id="${prefix}${i}">
          <div class="stat">Rank: #${i}</div>
          <div class="stat">Wins: 10</div>
          <div class="stat">Kills: 50</div>
          <div class="stat">Deaths: 20</div>
        </div>
      </div>
    `;
  }
}

function handleClick(number, id){
  const element = document.getElementById(id);
  const isOpening = !element.classList.contains("open");
  element.classList.toggle("open");

  if(number === 1 && isOpening){
    launchConfetti();
  }
}

function launchConfetti(){
  for(let i=0;i<90;i++){
    const confetti = document.createElement("div");
    confetti.classList.add("confetti");
    confetti.style.left = Math.random()*100 + "vw";
    confetti.style.backgroundColor = `hsl(${Math.random()*360},100%,50%)`;
    confetti.style.animationDuration = (2+Math.random()*2)+"s";
    document.body.appendChild(confetti);
    setTimeout(()=>confetti.remove(),4000);
  }
}

function init(){
  createPlayers("o","overall");
  createPlayers("s","sword");
  createPlayers("a","axe");
  createPlayers("u","uhc");
  createPlayers("m","mace");
  createPlayers("sp","spear");
}

init();

function showMode(mode, btn){
  document.querySelectorAll(".mode").forEach(m=>m.classList.remove("active"));
  document.getElementById(mode).classList.add("active");
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  btn.classList.add("active");
  sortActive();
}

function toggleSort(){
  sortLowToHigh = !sortLowToHigh;
  document.getElementById("sortArrow").textContent = sortLowToHigh ? "⬆" : "⬇";
  sortActive();
}

function sortActive(){
  const active = document.querySelector(".mode.active");
  const players = Array.from(active.querySelectorAll(".player"));
  players.sort((a,b)=>{
    const numA = Number(a.dataset.number);
    const numB = Number(b.dataset.number);
    return sortLowToHigh ? numA - numB : numB - numA;
  });
  players.forEach(p=>active.appendChild(p));
}

</script>

</body>
</html>
