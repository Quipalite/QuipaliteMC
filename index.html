<!DOCTYPE html>
<html>
<head>
  <title>Quipalite MC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:Segoe UI, Arial, sans-serif;
      background:#000;
      color:white;
      overflow-x:hidden;
    }

    header{
      text-align:center;
      padding:45px 20px;
      font-size:44px;
      font-weight:900;
      letter-spacing:3px;
      background:linear-gradient(90deg,#ff2db2,#ff66cc,#ff1493,#ff2db2);
      background-size:300% 300%;
      animation:bannerMove 5s ease infinite;
      border-bottom:3px solid #ff66cc;
    }

    @keyframes bannerMove{
      0%{background-position:0% 50%;}
      50%{background-position:100% 50%;}
      100%{background-position:0% 50%;}
    }

    .tabs{
      text-align:center;
      margin:20px 0;
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .tab{
      background:#111;
      border:1px solid #ff1493;
      color:white;
      padding:6px 12px;
      border-radius:6px;
      cursor:pointer;
      font-weight:bold;
      transition:0.2s ease;
    }
    .tab:hover{transform:scale(1.05);}
    .tab.active{background:#ff1493;}

    #searchInput{
      width:250px;padding:10px;border-radius:8px;
      border:1px solid #ff1493;background:#111;
      color:white;font-weight:bold;outline:none;
    }

    .container{max-width:900px;margin:auto;padding:20px;}

    .mode{display:none;opacity:0;transition:0.3s ease;}
    .mode.active{display:block;opacity:1;}

    .player{
      background:#111;margin:12px 0;padding:18px;
      border-radius:12px;border:1px solid #ff1493;
      cursor:pointer;
      transition:0.2s ease;
      animation:fadeIn 0.4s ease forwards;
      opacity:0;
      transform:translateY(10px);
      display:flex;
      align-items:center;
    }

    .player:hover{
      transform:scale(1.02);
      box-shadow:0 0 12px #ff1493;
    }

    @keyframes fadeIn{
      to{opacity:1;transform:translateY(0);}
    }

    .gold-glow{border:2px solid gold;box-shadow:0 0 16px gold;}
    .silver-glow{border:2px solid silver;box-shadow:0 0 14px silver;}
    .bronze-glow{border:2px solid #cd7f32;box-shadow:0 0 12px #cd7f32;}

    .number{
      display:inline-block;padding:6px 12px;
      border-radius:50%;
      font-weight:bold;margin-right:12px;
      min-width:30px;text-align:center;
    }
    .gold{background:gold;color:black;}
    .silver{background:silver;color:black;}
    .bronze{background:#cd7f32;color:white;}

    .crown{margin-left:6px;text-shadow:0 0 10px gold;}

    #profilePage{
      display:none;
      max-width:700px;
      margin:auto;
      padding:20px;
      opacity:0;
      transform:translateY(20px);
      transition:0.3s ease;
    }

    #profilePage.show{
      opacity:1;
      transform:translateY(0);
    }

    #profileContent{
      background:#111;padding:20px;border-radius:12px;
      border:1px solid #ff1493;
    }

    .backBtn{
      background:#ff1493;border:none;padding:10px 16px;
      color:white;font-weight:bold;border-radius:8px;
      cursor:pointer;margin-bottom:20px;
    }

    .no-results{
      text-align:center;
      margin:15px;
      font-weight:bold;
      color:#ff69b4;
      display:none;
    }
  </style>
</head>

<body>

<header>QUIPALITE MC</header>

<div class="tabs">
  <button class="tab active" onclick="showMode('overall', this)">Overall</button>
  <button class="tab" onclick="showMode('sword', this)">Sword</button>
  <button class="tab" onclick="showMode('axe', this)">Axe</button>
  <button class="tab" onclick="showMode('uhc', this)">UHC</button>
  <button class="tab" onclick="showMode('mace', this)">Mace</button>
  <button class="tab" onclick="showMode('spear', this)">Spear</button>
</div>

<div style="text-align:center;margin-bottom:15px;">
  <input type="text" id="searchInput" placeholder="Search player..." onkeyup="searchPlayers()">
  <div id="noResults" class="no-results">No results found</div>
</div>

<div class="container">
  <div id="overall" class="mode active"></div>
  <div id="sword" class="mode"></div>
  <div id="axe" class="mode"></div>
  <div id="uhc" class="mode"></div>
  <div id="mace" class="mode"></div>
  <div id="spear" class="mode"></div>
</div>

<div id="profilePage">
  <button class="backBtn" onclick="goBack()">⬅ Back</button>
  <div id="profileContent"></div>
</div>

<script>
const playerStats={
  sword:{
    RealO75:{wins:3,kills:9,deaths:4},
    Jai_B37:{wins:1,kills:3,deaths:1},
    skull_shredder30:{wins:1,kills:3,deaths:1},
    Killedbycrab:{wins:0,kills:3,deaths:6},
    Knoxy5316:{wins:0,kills:1,deaths:3}
  },
  axe:{
    Killedbycrab:{wins:2,kills:6,deaths:1},
    Jai_B37:{wins:1,kills:3,deaths:0},
    skull_shredder30:{wins:0,kills:1,deaths:3},
    "Yearly-scuff81":{wins:0,kills:0,deaths:3},
    Knoxy5316:{wins:0,kills:0,deaths:3}
  },
  uhc:{Killedbycrab:{wins:1,kills:3,deaths:0}, "Yearly-scuff81":{wins:0,kills:0,deaths:3}},
  mace:{
    Killedbycrab:{wins:8,kills:24,deaths:4},
    "Yearly-scuff81":{wins:0,kills:3,deaths:15},
    Aftlow:{wins:0,kills:0,deaths:3},
    Knoxy5316:{wins:0,kills:1,deaths:9}
  },
  spear:{Killedbycrab:{wins:1,kills:3,deaths:0}, Aftlow:{wins:1,kills:3,deaths:1}, "Yearly-scuff81":{wins:0,kills:1,deaths:6}}
};

const customTiers = {
  sword: { Killedbycrab: "Gold" },
  axe: { Killedbycrab: "Emerald" },
  uhc: { Killedbycrab: "Gold" },
  mace: { Killedbycrab: "Diamond" },
  spear: { Killedbycrab: "Gold" },
  overall: { Killedbycrab: "Emerald" }
};

function updateOverall() {
  const overall = {};
  for (const mode in playerStats) {
    if (mode === 'overall') continue;
    for (const player in playerStats[mode]) {
      if (!overall[player]) overall[player] = { wins: 0, kills: 0, deaths: 0 };
      overall[player].wins += playerStats[mode][player].wins;
      overall[player].kills += playerStats[mode][player].kills;
      overall[player].deaths += playerStats[mode][player].deaths;
    }
  }
  playerStats.overall = overall;
}

function getOrderedPlayers(containerId) {
  if(containerId === 'overall') updateOverall();
  return Object.entries(playerStats[containerId])
    .sort((a,b)=>{
      if(b[1].wins !== a[1].wins) return b[1].wins - a[1].wins;
      if(b[1].kills !== a[1].kills) return b[1].kills - a[1].kills;
      return a[1].deaths - b[1].deaths;
    })
    .map(e=>e[0]);
}

function createPlayers(containerId){
  const container=document.getElementById(containerId);
  const players=getOrderedPlayers(containerId);
  container.innerHTML='';
  for(let i=0;i<players.length && i<15;i++){
    const playerName=players[i];
    let glow='',numberClass='',tier='Tier IV';

    if(i===0){glow='gold-glow';numberClass='gold';tier='Tier I';}
    if(i===1){glow='silver-glow';numberClass='silver';tier='Tier II';}
    if(i===2){glow='bronze-glow';numberClass='bronze';tier='Tier III';}

    if(customTiers[containerId] && customTiers[containerId][playerName]){
      tier = customTiers[containerId][playerName];
    }

    container.innerHTML+=`
      <div class="player ${glow}" onclick="openProfile('${playerName}','${tier}')">
        <span class="number ${numberClass}">#${i+1}</span>
        ${i===0?'<span class="crown">👑</span>':''}
        <b>${playerName}</b>
      </div>
    `;
  }
}

function openProfile(name,tier){
  const activeMode=document.querySelector('.tab.active').textContent.toLowerCase();
  let stats=playerStats[activeMode]?.[name] || playerStats.overall[name] || {wins:'N/A',kills:'N/A',deaths:'N/A'};
  let kd=stats.kills!=='N/A' ? (stats.deaths===0?'∞':(stats.kills/stats.deaths).toFixed(2)):'N/A';
  document.getElementById('profileContent').innerHTML=`
    <h2 style="margin-top:0;color:#ff69b4;">${name}</h2>
    <h3 style="color:gold;margin-top:-10px;">${tier}</h3>
    <hr style="border:0;border-top:1px solid #ff1493;">
    <p><b>Wins:</b> ${stats.wins}</p>
    <p><b>Kills:</b> ${stats.kills}</p>
    <p><b>Deaths:</b> ${stats.deaths}</p>
    <p><b>K/D:</b> ${kd}</p>
  `;
  document.querySelector('.tabs').style.display='none';
  document.querySelector('.container').style.display='none';
  document.getElementById('searchInput').style.display='none';
  const profile=document.getElementById('profilePage');
  profile.style.display='block';
  setTimeout(()=>profile.classList.add('show'),10);
}

function goBack(){
  const profile=document.getElementById('profilePage');
  profile.classList.remove('show');
  setTimeout(()=>{
    profile.style.display='none';
    document.querySelector('.tabs').style.display='flex';
    document.querySelector('.container').style.display='block';
    document.getElementById('searchInput').style.display='inline-block';
  },300);
}

function searchPlayers(){
  const value=document.getElementById('searchInput').value.toLowerCase();
  const active=document.querySelector('.mode.active');
  let found=false;
  active.querySelectorAll('.player').forEach(p=>{
    const name=p.querySelector('b').textContent.toLowerCase();
    const match=name.includes(value);
    p.style.display=match?'flex':'none';
    if(match) found=true;
  });
  document.getElementById('noResults').style.display=found?'none':'block';
}

function showMode(mode,btn){
  document.querySelectorAll('.mode').forEach(m=>m.classList.remove('active'));
  document.getElementById(mode).classList.add('active');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  searchPlayers();
}

['sword','axe','uhc','mace','spear'].forEach(createPlayers);
createPlayers('overall');
</script>

</body>
</html>
